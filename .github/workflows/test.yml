name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Bun-only coverage gate (existing CI). Kept here so frontend-only
  # changes still get fast coverage feedback without running the full
  # Go platform matrix.
  bun-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run build:tsc

      - name: Run tests with coverage gate
        run: bun run scripts/check-coverage.ts --lines 0.9 --funcs 0.9

  # Reuse the Go backend test matrix (fast checks, native Linux/Windows
  # jobs, Docker smoke, and frontend build). Defined in go-test.yml so
  # it can also be triggered independently or from other workflows.
  go-tests:
    needs: bun-test
    uses: ./.github/workflows/go-test.yml
